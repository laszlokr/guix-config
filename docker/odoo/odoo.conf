[options]
; Extra addons mounted from the repo's docker/odoo/addons/ directory.
addons_path = /mnt/extra-addons

; Set the master password via the Odoo database manager UI after first start,
; or replace the placeholder below with a hashed value.
; Generate: python3 -c "from passlib.hash import pbkdf2_sha512; print(pbkdf2_sha512.hash('yourpass'))"
admin_passwd = TODO_set_after_first_start

; Send logs to stdout so Docker captures them.
logfile = False
log_level = info

; Required when serving behind a reverse proxy (nginx).
proxy_mode = True

; Tune workers based on available CPU cores: workers = (2 * cores) + 1
; Set to 0 to use the threaded server (simpler, fine for low traffic).
workers = 2
limit_time_cpu = 600
limit_time_real = 1200
