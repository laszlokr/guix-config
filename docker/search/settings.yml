# SearXNG settings
# See https://docs.searxng.org/admin/settings/settings.html for all options.

use_default_settings: true

general:
  instance_name: "SearXNG"
  debug: false
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"

server:
  # Generate a new secret key: openssl rand -hex 32
  secret_key: "TODO_replace_with_openssl_rand_-hex_32"
  limiter: false
  image_proxy: true
  method: "GET"

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: true
  infinite_scroll: true
  center_alignment: false
  default_theme: auto

engines:
  - name: google
    engine: google
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false
  - name: github
    engine: github
    disabled: false
