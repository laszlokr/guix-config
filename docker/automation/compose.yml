services:

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${WEBHOOK_URL}
      GENERIC_TIMEZONE: Europe/Zurich
      TZ: Europe/Zurich
    volumes:
      - /data/docker/automation/n8n:/home/node/.n8n
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  gotify:
    image: gotify/server:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    environment:
      GOTIFY_DEFAULTUSER_PASS: ${GOTIFY_DEFAULTUSER_PASS}
    volumes:
      - /data/docker/automation/gotify:/app/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - internal

networks:
  internal:
    driver: bridge
